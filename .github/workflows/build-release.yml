name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        continue-on-error: true

      - name: Find APK files
        id: find_apk
        run: |
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)

          if [ -n "$DEBUG_APK" ]; then
            echo "Found debug APK: $DEBUG_APK"
            cp "$DEBUG_APK" CodeEditor-debug.apk
          fi

          if [ -n "$RELEASE_APK" ]; then
            echo "Found release APK: $RELEASE_APK"
            cp "$RELEASE_APK" CodeEditor-release.apk
          fi

          ls -la *.apk 2>/dev/null || echo "No APK files found yet"

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CodeEditor ${{ github.ref_name }}"
          body: |
            ## CodeEditor - Native Android Code Editor ${{ github.ref_name }}

            ### Features
            - Java + C++ NDK/JNI native Android development
            - Monaco Editor in WebView for code editing
            - iOS-style UI design
            - Custom file manager with real filesystem access
            - Python, C++, Java syntax highlighting and execution
            - Local code execution - no server required

            ### How to Install
            1. Download `CodeEditor-debug.apk` below
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK file to install

            ### Build Info
            - Min Android: 7.0 (API 24)
            - Target: Android 14 (API 34)
            - Architecture: armeabi-v7a, arm64-v8a, x86, x86_64
          files: |
            CodeEditor-debug.apk
            CodeEditor-release.apk
